<ngx-toast-container />

@if (navigating()) {
<div class="nav-loading-indicator" role="status" aria-live="polite">Loading…</div>
}

<h1>{{'title' | translate}}</h1>

<ng-container *ngxMediaQuery="['Desktop', 'Tablet']">
	<button ngxButton (click)="toggleLoading()">Toggle loading</button>
</ng-container>

<button
	*ngxTourShowWhen="'whenInactive'"
	ngxTooltip="Hello, this is a tooltip!"
	ngxTooltipPosition="above"
	ngxButton
	icon="fa fa-home"
	[loading]="loading()"
	(click)="startTour()"
>
	Start tour
</button>

<button ngxButton priority="secondary" (click)="showToast()">TOAST</button>

<button ngxButton buttonType="fab" priority="tertiary" icon="fa fa-home">{{''}}</button>

<button ngxButton buttonType="text">Home</button>

<button ngxButton buttonType="text" display="icon" icon="fa fa-home">{{''}}</button>
<button-test label="Hello" />

{{['Desktop', 'DesktopWide', 'Tablet'] | ngxMatchesQuery: 'some'}}

<nav>
	<ul>
		<li>
			<a
				[routerLink]="navigating() ? null : ['/', i18nService.currentLanguage, 'lib-1']"
				[attr.aria-disabled]="navigating()"
				>Move to lazy loaded lib-1</a
			>
		</li>
		<li>
			<a
				[routerLink]="navigating() ? null : ['/', i18nService.currentLanguage, 'lib-2']"
				[attr.aria-disabled]="navigating()"
				>Move to lazy loaded lib-2</a
			>
		</li>
	</ul>
</nav>

<router-outlet></router-outlet>
